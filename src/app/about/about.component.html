  <!--====== PORTFOLIO START ======-->
  <section class="portfolio-area" id="undiscover-portfolio">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-xxl-6 col-xl-7 col-lg-8">
          <div class="section-title text-center mb-5">
            <h2 class="mb-3 fw-bold">Portfolio</h2>
          </div>
        </div>
      </div>
    <!-- row -->
    <div class="row grid">

      @for (item of projects; let i = $index; track item) {
        <div
          class="col-lg-4 col-sm-6 col-6 py-2"
          >
          <div class="portfolio-style-three">
            <div class="portfolio-image">
              <img
                src="{{ item.img }}"
                alt="portfolio single project image {{ item.name }}"
                />
            </div>
            <div class="portfolio-text">
              <h4 class="portfolio-title">
                <a href="{{ item.url }}">{{ item.name }}</a>
              </h4>
              <p class="text">
                {{ item.desc }}
              </p>
            </div>
          </div>
          <!-- single portfolio -->
        </div>
      }

    </div>
    <!-- row -->
  </div>
  <!-- container -->
</section>
<!--====== PORTFOLIO ENDS ======-->
